<style>
:root {
    --z1rov-bg: #0a0a0a;
    --z1rov-fg: #e0e0e0;
    --z1rov-fg-dim: #7a7a7a;
    --z1rov-card-bg: #141414;
    --z1rov-card-hover: #1c1c1c;
    --z1rov-accent: #ffffff;
    --z1rov-font: "JetBrainsMono NF", "JetBrains Mono", monospace;
    --z1rov-radius: 14px;
    --z1rov-radius-sm: 10px;
    --z1rov-gap: 14px;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    min-width: 0;
}

html, body {
    height: 100%;
    width: 100%;
}

body {
    background: var(--z1rov-bg);
    color: var(--z1rov-fg);
    font-family: var(--z1rov-font);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: clamp(10px, 4vh, 48px) clamp(10px, 4vw, 48px);
    overflow: auto;
}

main {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 5vh, 56px);
}

.z1rov-clock-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
}

#z1rov-clock {
    font-size: clamp(30px, 9vw, 96px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--z1rov-accent);
    font-variant-numeric: tabular-nums;
}

#z1rov-greeting {
    font-size: clamp(11px, 2vw, 18px);
    font-weight: 700;
    color: var(--z1rov-fg-dim);
    overflow-wrap: anywhere;
}

#z1rov-greeting span {
    color: var(--z1rov-fg);
}

.z1rov-links {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: clamp(6px, 2vw, 14px);
    width: 100%;
}

.z1rov-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(4px, 1.5vw, 10px);
    background: var(--z1rov-card-bg);
    border-radius: var(--z1rov-radius);
    padding: clamp(10px, 3vw, 32px) clamp(4px, 2vw, 16px);
    text-decoration: none;
    color: var(--z1rov-fg);
    transition: background-color 0.15s ease, transform 0.15s ease;
    overflow: hidden;
}

.z1rov-card:hover {
    background: var(--z1rov-card-hover);
    transform: translateY(-2px);
}

.z1rov-card:active {
    transform: translateY(0);
}

.z1rov-card svg {
    width: clamp(16px, 4vw, 28px);
    height: clamp(16px, 4vw, 28px);
    fill: var(--z1rov-fg);
    flex-shrink: 0;
}

.z1rov-card span {
    font-size: clamp(8px, 2vw, 12px);
    font-weight: 700;
    color: var(--z1rov-fg-dim);
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
}

@media (max-width: 340px) {
    .z1rov-card span {
        display: none;
    }
}

@media (max-height: 340px) {
    #z1rov-greeting {
        display: none;
    }
    main {
        gap: 12px;
    }
}
</style>
</head>

<script>
const z1rovUser = "User";
document.getElementById("z1rov-username").textContent = z1rovUser;

function z1rovUpdateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    document.getElementById("z1rov-clock").textContent = h + ":" + m;

    const hour = now.getHours();
    let greeting = "Good morning!";
    if (hour >= 12 && hour < 19) greeting = "Good afternoon!";
    else if (hour >= 19 || hour < 5) greeting = "Good evening!";
    document.getElementById("z1rov-greeting").firstChild.textContent = greeting + " ";
}

z1rovUpdateClock();
setInterval(z1rovUpdateClock, 1000);
</script>
